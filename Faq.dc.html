<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;}
  .faq-item{transition:border-color .2s ease;}
  .faq-item[aria-expanded="true"]{border-color:#dcd9d1;}
  .faq-item[aria-expanded="true"] .faq-a{grid-template-rows:1fr!important; opacity:1!important; padding-top:0;}
  .faq-item[aria-expanded="true"] .faq-chevron{transform:rotate(45deg);}
  .faq-q:hover{color:#211f1b!important;}
</style>
</helmet>
<section style="--brand: {{ brand }}; background:#f5f4f1; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:#211f1b;">
  <div style="max-width:880px; margin:0 auto; padding:72px 24px;">
    <div style="text-align:center; margin-bottom:38px;">
      <div style="font:700 12px/1 'Archivo',sans-serif; letter-spacing:.14em; text-transform:uppercase; color:#b0aca3; margin-bottom:10px;">{{ eyebrow }}</div>
      <h2 style="font:800 36px/1.04 'Archivo',sans-serif; letter-spacing:-.018em; margin:0 0 10px;">{{ heading }}</h2>
      <p style="font:400 15px/1.55 inherit; color:#6a6760; max-width:460px; margin:0 auto;">{{ subhead }}</p>
    </div>

    <div style="display:flex; flex-direction:column; gap:12px;">
      <sc-for list="{{ faqs }}" as="f" hint-placeholder-count="6">
        <div class="faq-item" aria-expanded="false" onClick="{{ toggle }}" style="background:#fff; border:1px solid #ebe9e4; border-radius:14px; padding:20px 24px; cursor:pointer; box-shadow:0 1px 3px rgba(28,25,23,.04);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:16px;">
            <span class="faq-q" style="font:700 16px/1.4 'Archivo',sans-serif; color:#2b2925; transition:color .15s;">{{ f.q }}</span>
            <i class="bi bi-plus-lg faq-chevron" style="flex:none; font-size:16px; color:var(--brand,#ffd400); transition:transform .25s ease;"></i>
          </div>
          <div class="faq-a" style="display:grid; grid-template-rows:0fr; opacity:0; transition:grid-template-rows .28s ease, opacity .28s ease;">
            <div style="overflow:hidden;">
              <p style="font:400 14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:#5a574f; margin:14px 0 2px; text-wrap:pretty;">{{ f.a }}</p>
            </div>
          </div>
        </div>
      </sc-for>
    </div>

    <div style="text-align:center; margin-top:32px; font:500 14px/1.6 inherit; color:#6a6760;">
      Still have a question? <a href="mailto:info@themonkeyvault.com" style="color:#211f1b; font-weight:700; text-decoration:none; border-bottom:2px solid var(--brand,#ffd400);">Email us</a> or call <a href="tel:+16473501111" style="color:#211f1b; font-weight:700; text-decoration:none; border-bottom:2px solid var(--brand,#ffd400);">(647) 350-1111</a>.
    </div>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 880, &quot;height&quot;: 700},
  &quot;brand&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#ffd400&quot;,&quot;#2196f3&quot;,&quot;#f44336&quot;,&quot;#2e9e4f&quot;,&quot;#8c52ff&quot;]},
  &quot;eyebrow&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Good to know&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;heading&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Frequently asked questions&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;subhead&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Everything a first-timer usually wants to know before walking in.&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;faqs&quot;: {&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{q:string;a:string}[]&quot;}
}">
class Component extends DCLogic {
  toggle = (e) => {
    const item = e.currentTarget;
    item.setAttribute('aria-expanded', item.getAttribute('aria-expanded') === 'true' ? 'false' : 'true');
  };
  renderVals() {
    const p = this.props;
    const def = [
      { q:'Do I need any experience to start?', a:"None at all. Most people who walk in have never done parkour before. Book an Introduction Class or drop into open gym and a coach will start you with the basics at your own pace." },
      { q:'What ages do you welcome?', a:'Everyone from age 3 and up. We run youth classes, adult classes, camps for kids 6–16, and open gym for all ages. There is a class and a session for every body.' },
      { q:'What should I wear and bring?', a:'Comfortable clothes you can move in, a second pair of clean indoor shoes (not the ones you arrived in), and a water bottle. Forgot your shoes? You can train barefoot to start.' },
      { q:'Do I need to sign a waiver?', a:'Yes — everyone needs a signed waiver before their first session. It takes a couple of minutes online. A parent or legal guardian must sign for anyone 17 or younger.' },
      { q:'Do I have to book, or can I just drop in?', a:'Both work. Open Gym and Group Classes need no reservation — just check the schedule and show up. Introduction and Private Classes are reserved ahead of time so a coach is set aside for you.' },
      { q:'Is it safe? What about the kids?', a:'Safety is built into the space — padded floors, a foam pit, and trained coaches who scale every skill to your level. Read the Rules poster at the entrance and your coach will guide the rest.' },
      { q:'How early should I arrive?', a:"Please arrive 15 minutes before your class to sign in. There's a 15-minute cutoff, and anyone more than 30 minutes late can't be admitted to that class, to be fair to those who arrive on time." },
      { q:'Can I host a birthday or group event?', a:'Absolutely. We run full and mini birthday parties plus group events for schools, teams and organizations. Weekend slots fill fast, so book early — see the Events page for details.' },
    ];
    return {
      brand: p.brand ?? '#ffd400',
      eyebrow: p.eyebrow ?? 'Good to know',
      heading: p.heading ?? 'Frequently asked questions',
      subhead: p.subhead ?? "Everything a first-timer usually wants to know before walking in.",
      faqs: Array.isArray(p.faqs) && p.faqs.length ? p.faqs : def,
      toggle: this.toggle,
    };
  }
}
</script>
</body>
</html>
