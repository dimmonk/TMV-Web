<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account hero card — The Monkey Vault members app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root { --ma-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #e9e7e1; font-family: var(--ma-body); color: #211f1b;
         display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; padding: 44px 24px; }
  .stage { width: 344px; }
  .stage-eyebrow { font: 800 13px/1 'Archivo', sans-serif; letter-spacing: .06em;
                   text-transform: uppercase; color: #9b8e6a; margin: 0 0 12px 4px; }

  /* ============ THE ACCOUNT HERO (member wallet) CARD ============ */
  .ma-wcard { width: 100%; background: #211f1b; color: #fff; border-radius: 24px;
              padding: 24px; position: relative; overflow: hidden; }
  .ma-wcard-glow { position: absolute; inset: 0; }           /* per-member radial tint */
  .ma-wcard-inner { position: relative; }

  /* header: name + role, and the waiver pill on the right */
  .ma-wcard-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .ma-wcard-id { flex: 1; min-width: 0; }
  .ma-wcard-name { font: 800 20px/1.1 'Archivo', sans-serif; letter-spacing: -.01em; }
  .ma-wcard-role { font: 600 13.5px/1.3 var(--ma-body); color: rgba(255,255,255,.55); margin-top: 3px; }
  .ma-wchip { flex: none; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
              font: 700 11px/1 'Archivo', sans-serif; letter-spacing: .05em; text-transform: uppercase;
              border-radius: 999px; padding: 6px 10px; white-space: nowrap; }
  .ma-wchip i { font-size: 12px; }
  .ma-wchip.is-ok   { color: #5fd07f; background: rgba(95,208,127,.14); }   /* waiver signed */
  .ma-wchip.is-need { color: #ffd400; background: rgba(255,212,0,.14); }    /* waiver needed — links to waiver page */

  /* ---- an entitlement entry: membership or a pass. Separated by a top hairline ---- */
  .ma-went { padding: 18px 0; border-top: 1px solid rgba(255,255,255,.09); }
  .ma-went:last-child { padding-bottom: 2px; }
  .ma-went-type { font: 700 9.5px/1 'Archivo', sans-serif; letter-spacing: .13em; text-transform: uppercase; color: rgba(255,255,255,.4); }

  /* headline row: category name (in its colour, set inline) + the big count on the right */
  .ma-went-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-top: 11px; }
  .ma-went-name { font: 800 21px/1 'Archivo', sans-serif; }
  .ma-went-count { flex: none; font: 800 21px/1 'Archivo', sans-serif; color: #fff; }
  .ma-went-count small { font: 700 12px/1 'Archivo', sans-serif; color: rgba(255,255,255,.5); }

  /* membership progress bar (continuous days; fill colour set inline) */
  .ma-wbar { height: 5px; border-radius: 999px; background: rgba(255,255,255,.14); overflow: hidden; margin: 14px 0 12px; }
  .ma-wbar > i { display: block; height: 100%; border-radius: 999px; }

  /* pass pips: one per ticket, filled = remaining, max 10 per row (wraps for 20-packs) */
  .ma-wpips { display: flex; flex-direction: column; gap: 4px; margin: 14px 0 12px; }
  .ma-wpips-row { display: flex; gap: 4px; }
  .ma-wpip { flex: 1; height: 6px; border-radius: 999px; background: rgba(255,255,255,.14); }

  /* small print: two facts pinned to opposite edges so they scan as columns */
  .ma-went-facts { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .ma-went-facts span { font: 600 11.5px/1 var(--ma-body); color: rgba(255,255,255,.5); }

  /* empty-slot quick-add (shown when a member has no passes yet) */
  .ma-addslot { cursor: pointer; width: 100%; display: flex; align-items: center; gap: 10px;
                background: rgba(255,255,255,.05); border: 1px dashed rgba(255,255,255,.22);
                border-radius: 14px; padding: 14px; color: #fff; }
  .ma-addslot-plus { flex: none; width: 24px; height: 24px; border-radius: 50%; background: #ffd400;
                     color: #211f1b; display: flex; align-items: center; justify-content: center; }
  .ma-addslot-plus i { font-size: 13px; }
  .ma-addslot-label { font: 700 12.5px/1 'Archivo', sans-serif; }
</style>
</head>
<body>

  <!-- ============ Variant A: populated (parent on a family account) ============ -->
  <div class="stage">
    <div class="stage-eyebrow">On your account</div>
    <div class="ma-wcard">
      <div class="ma-wcard-glow" style="background:radial-gradient(340px 190px at 88% -25%, rgba(255,212,0,.18), transparent 70%)"></div>
      <div class="ma-wcard-inner">
        <div class="ma-wcard-head">
          <div class="ma-wcard-id">
            <div class="ma-wcard-name">Ana Rivera</div>
            <div class="ma-wcard-role">You · Parent</div>
          </div>
          <a class="ma-wchip is-ok" href="#"><i class="bi bi-patch-check-fill"></i>Waiver</a>
        </div>

        <!-- membership -->
        <div class="ma-went">
          <div class="ma-went-type">Membership</div>
          <div class="ma-went-head">
            <span class="ma-went-name" style="color:#2196f3">Classes</span>
            <span class="ma-went-count">18<small> days</small></span>
          </div>
          <div class="ma-wbar"><i style="width:60%;background:#2196f3"></i></div>
          <div class="ma-went-facts"><span>30 days</span><span>Expires Aug 5</span></div>
        </div>

        <!-- pass: 20-pack, healthy (pips wrap to two rows of 10) -->
        <div class="ma-went">
          <div class="ma-went-type">Pass</div>
          <div class="ma-went-head">
            <span class="ma-went-name" style="color:#2196f3">Classes</span>
            <span class="ma-went-count">14<small> left</small></span>
          </div>
          <div class="ma-wpips">
            <div class="ma-wpips-row">
              <span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span>
            </div>
            <div class="ma-wpips-row">
              <span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip" style="background:#2196f3"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span>
            </div>
          </div>
          <div class="ma-went-facts"><span>20-pack</span><span>Expires Jan 14</span></div>
        </div>

        <!-- pass: low (≤10% remaining → red pip) -->
        <div class="ma-went">
          <div class="ma-went-type">Pass</div>
          <div class="ma-went-head">
            <span class="ma-went-name" style="color:#f44336">Private - Kids</span>
            <span class="ma-went-count">1<small> left</small></span>
          </div>
          <div class="ma-wpips">
            <div class="ma-wpips-row">
              <span class="ma-wpip" style="background:#ff5747"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span><span class="ma-wpip"></span>
            </div>
          </div>
          <div class="ma-went-facts"><span>5-pack</span><span>Expires Jan 14</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ Variant B: waiver needed + empty passes (kid) ============ -->
  <div class="stage">
    <div class="stage-eyebrow">Waiver needed / empty states</div>
    <div class="ma-wcard">
      <div class="ma-wcard-glow" style="background:radial-gradient(340px 190px at 88% -25%, rgba(255,184,42,.16), transparent 70%)"></div>
      <div class="ma-wcard-inner">
        <div class="ma-wcard-head">
          <div class="ma-wcard-id">
            <div class="ma-wcard-name">Leo</div>
            <div class="ma-wcard-role">Age 11 · Kid</div>
          </div>
          <a class="ma-wchip is-need" href="#"><i class="bi bi-exclamation-triangle-fill"></i>Waiver</a>
        </div>

        <!-- athletic membership -->
        <div class="ma-went">
          <div class="ma-went-type">Membership</div>
          <div class="ma-went-head">
            <span class="ma-went-name" style="color:#ffb82a">Athletic</span>
            <span class="ma-went-count">22<small> days</small></span>
          </div>
          <div class="ma-wbar"><i style="width:73%;background:#ffb82a"></i></div>
          <div class="ma-went-facts"><span>30 days</span><span>Expires Aug 8</span></div>
        </div>

        <!-- empty passes -->
        <div class="ma-went">
          <div class="ma-went-type" style="margin-bottom:12px">Passes</div>
          <button class="ma-addslot">
            <span class="ma-addslot-plus"><i class="bi bi-plus-lg"></i></span>
            <span class="ma-addslot-label">Add passes</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
