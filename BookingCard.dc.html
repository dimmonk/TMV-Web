<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  .bk-card{transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;}
  .bk-card:hover{transform:translateY(-4px); box-shadow:0 1px 3px rgba(28,25,23,.05),0 22px 40px -24px rgba(28,25,23,.5)!important; border-color:color-mix(in srgb,var(--cat) 50%,#ebe9e4)!important;}
  .bk-card:hover .bk-act{gap:11px!important;}
</style>
</helmet>
<a class="bk-card" href="{{ href }}" target="{{ target }}" rel="noopener" style="--cat:{{ catColor }}; --ink:{{ ink }}; --catText:{{ catText }}; --stBg:{{ statusBg }}; --stFg:{{ statusFg }}; position:relative; height:100%; display:flex; flex-direction:column; background:#fff; border:1px solid #ebe9e4; border-radius:16px; overflow:hidden; box-shadow:0 1px 3px rgba(28,25,23,.05),0 12px 30px -22px rgba(28,25,23,.4); text-decoration:none; color:inherit; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <span style="height:4px; background:var(--cat); flex:none;"></span>
  <div style="display:flex; flex-direction:column; gap:13px; padding:20px 20px 22px; flex:1;">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <sc-if value="{{ hasBookingTag }}" hint-placeholder-val="">
        <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:6px; background:var(--cat); color:var(--ink); font:800 10.5px/1 'Archivo',sans-serif; letter-spacing:.07em; text-transform:uppercase;"><i class="bi {{ bookingIcon }}" style="font-size:12px;"></i>{{ bookingTag }}</span>
      </sc-if>
      <sc-if value="{{ duration }}" hint-placeholder-val="{{ true }}">
        <span style="display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:999px; background:color-mix(in srgb,var(--cat) 13%,#fff); color:var(--catText); font:700 10px/1 'Archivo',sans-serif; letter-spacing:.09em; text-transform:uppercase;"><i class="bi bi-clock"></i>{{ duration }}</span>
      </sc-if>
      <sc-if value="{{ flag }}" hint-placeholder-val="">
        <span style="padding:5px 10px; border-radius:999px; background:var(--cat); color:var(--ink); font:700 10px/1 'Archivo',sans-serif; letter-spacing:.08em; text-transform:uppercase;">{{ flag }}</span>
      </sc-if>
      <sc-if value="{{ status }}" hint-placeholder-val="">
        <span style="padding:5px 10px; border-radius:999px; background:var(--stBg); color:var(--stFg); font:700 10px/1 'Archivo',sans-serif; letter-spacing:.08em; text-transform:uppercase;">{{ status }}</span>
      </sc-if>
    </div>
    <h3 style="font:800 20px/1.12 'Archivo',sans-serif; letter-spacing:-.01em; color:#211f1b; margin:0;">{{ title }}</h3>
    <p style="font:400 13px/1.5 inherit; color:#5b5853; margin:0;">{{ description }}</p>
    <div style="margin-top:auto; display:flex; flex-direction:column; gap:13px;">
    <sc-if value="{{ hasPills }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        <sc-for list="{{ pillList }}" as="pill" hint-placeholder-count="3">
          <span style="font:600 12.5px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:var(--catText); background:color-mix(in srgb,var(--cat) 10%,#fff); border:1px solid color-mix(in srgb,var(--cat) 24%,#fff); border-radius:999px; padding:5px 10px; white-space:nowrap;">{{ pill }}</span>
        </sc-for>
      </div>
    </sc-if>
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:14px; padding-top:16px; border-top:1px solid #efeee8;">
      <div>
        <sc-if value="{{ price }}" hint-placeholder-val="">
          <div data-tmv-price-sub="{{ priceKey }}" style="font:800 20px/1 'Archivo',sans-serif; color:#211f1b;">{{ price }}</div>
        </sc-if>
        <sc-if value="{{ priceNote }}" hint-placeholder-val="">
          <div style="font:600 12.5px/1.3 inherit; color:#9b9890; margin-top:6px;">{{ priceNote }}</div>
        </sc-if>
      </div>
      <span class="bk-act" style="flex:none; display:inline-flex; align-items:center; gap:7px; font:800 13.5px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; color:#211f1b; transition:gap .15s;">{{ actionLabel }} <i class="bi bi-arrow-right" style="color:var(--catText);"></i></span>
    </div>
    </div>
  </div>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:290},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2196f3&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#f44336&quot;,&quot;#ffd400&quot;,&quot;#e27902&quot;,&quot;#2196f3&quot;,&quot;#2e9e4f&quot;,&quot;#8c52ff&quot;]},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2 hrs&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;bookingTag&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;&quot;,&quot;Drop-in&quot;,&quot;By appointment&quot;,&quot;Membership&quot;,&quot;Register&quot;]},&quot;flag&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;statusTone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;neutral&quot;,&quot;options&quot;:[&quot;neutral&quot;,&quot;go&quot;,&quot;info&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Full Birthday Party&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;description&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A coached session, a private party room and free play — coaches with the group the whole time.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;pills&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ages 5+ | Private room | Coach-led&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;$350 base&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;priceNote&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;up to 8 kids&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;actionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Book&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;target&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;_self&quot;,&quot;options&quot;:[&quot;_self&quot;,&quot;_blank&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  // Decide readable foreground for a given accent (white on dark, ink on light)
  pickInk(hex) {
    const h = (hex || '').toString().replace('#', '');
    if (h.length < 6) return '#fff';
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    const L = 0.299 * r + 0.587 * g + 0.114 * b;
    return L > 150 ? '#211f1b' : '#fff';
  }
  renderVals() {
    const p = this.props;
    const catColor = (p.color && p.color.toString().trim()) ? p.color.toString().trim() : '#2196f3';
    const ink = this.pickInk(catColor);
    // On light accents (e.g. yellow), tinted text needs darkening to stay legible.
    const catText = ink === '#211f1b' ? 'color-mix(in srgb, ' + catColor + ' 62%, #000)' : catColor;
    const pillList = (p.pills ?? '').toString().split('|').map(s => s.trim()).filter(Boolean);
    const bookingTag = (p.bookingTag ?? '').toString().trim();
    const bookingIconMap = { 'Drop-in': 'bi-door-open', 'By appointment': 'bi-calendar-check', 'Membership': 'bi-arrow-repeat', 'Register': 'bi-calendar-event' };
    const bookingIcon = bookingIconMap[bookingTag] || 'bi-info-circle';
    const tones = {
      neutral: { fg:'#211f1b', bg:'#f3f2ee' },
      go:      { fg:'#1b6b2f', bg:'#e6f4ea' },
      info:    { fg:'#3a4a8c', bg:'#eef0f6' },
    };
    const tone = tones[(p.statusTone ?? 'neutral')] || tones.neutral;
    return {
      catColor, ink, catText,
      duration: (p.duration ?? '').toString(),
      flag: (p.flag ?? '').toString().trim(),
      status: (p.status ?? '').toString().trim(),
      statusFg: tone.fg, statusBg: tone.bg,
      title: p.title ?? '',
      description: p.description ?? '',
      pillList, hasPills: pillList.length > 0,
      bookingTag, hasBookingTag: !!bookingTag, bookingIcon,
      price: (p.price ?? '').toString().trim(),
      // optional PRICES key (site-config.js) — lets applyPrices() keep the
      // displayed number in sync with the single source of truth
      priceKey: (p.priceKey ?? '').toString().trim(),
      priceNote: (p.priceNote ?? '').toString().trim(),
      actionLabel: p.actionLabel ?? 'Book',
      href: p.href ?? '#',
      target: p.target ?? '_self',
    };
  }
}
</script>
</body>
</html>
