<!DOCTYPE html>
<html>
<head>
<script>(function(){try{var m=(window.matchMedia&&window.matchMedia('(max-width:819px)').matches)||/Android|iPhone|iPod|Windows Phone|BlackBerry|Mobile/i.test(navigator.userAgent);if(m){location.replace('mobile.html#reviews');}}catch(e){}})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;}
  .rv-card{transition:transform .2s ease, box-shadow .2s ease;}
  .rv-card:hover{transform:translateY(-4px); box-shadow:0 1px 3px rgba(28,25,23,.05),0 26px 48px -26px rgba(28,25,23,.5)!important;}
  .rv-write:hover{transform:translateY(-1px);}
  .rv-write{transition:transform .15s ease;}
</style>
</helmet>
<section style="--brand: {{ brand }}; background:#f5f4f1; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:#211f1b;">
  <div style="max-width:1200px; margin:0 auto; padding:72px 24px;">

    <!-- header row: eyebrow + heading on the left, rating summary on the right -->
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:32px; flex-wrap:wrap; margin-bottom:36px;">
      <div>
        <div style="font:700 12px/1 'Archivo',sans-serif; letter-spacing:.14em; text-transform:uppercase; color:#b0aca3; margin-bottom:10px;">{{ eyebrow }}</div>
        <h2 style="font:800 36px/1.04 'Archivo',sans-serif; letter-spacing:-.018em; margin:0 0 8px;">{{ heading }}</h2>
        <p style="font:400 15px/1.55 inherit; color:#6a6760; max-width:520px; margin:0;">{{ subhead }}</p>
      </div>

      <!-- google rating badge -->
      <div style="flex:none; display:flex; align-items:center; gap:18px; background:#fff; border:1px solid #ebe9e4; border-radius:16px; padding:18px 24px; box-shadow:0 1px 3px rgba(28,25,23,.05),0 16px 34px -30px rgba(28,25,23,.4);">
        <div style="text-align:center;">
          <div style="font:900 38px/1 'Archivo',sans-serif; letter-spacing:-.02em; color:#211f1b;">{{ ratingValue }}</div>
          <div style="display:flex; gap:2px; justify-content:center; margin-top:6px; color:#ffb400; font-size:13px;">
            <sc-for list="{{ ratingStars }}" as="s" hint-placeholder-count="5">
              <i class="bi bi-star-fill"></i>
            </sc-for>
          </div>
        </div>
        <div style="width:1px; height:46px; background:#ebe9e4;"></div>
        <div>
          <div style="display:flex; align-items:center; gap:7px; font:800 14px/1 'Archivo',sans-serif; color:#211f1b;"><i class="bi bi-google" style="color:#4285f4; font-size:15px;"></i>Google Reviews</div>
          <div style="font:600 12.5px/1.3 inherit; color:#9b9890; margin-top:6px;">{{ ratingCount }}</div>
        </div>
      </div>
    </div>

    <!-- review cards -->
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px;">
      <sc-for list="{{ reviewList }}" as="r" hint-placeholder-count="3">
        <figure class="rv-card" style="margin:0; display:flex; flex-direction:column; background:#fff; border:1px solid #ebe9e4; border-radius:18px; padding:28px 28px 24px; box-shadow:0 1px 3px rgba(28,25,23,.05),0 16px 34px -30px rgba(28,25,23,.4);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px;">
            <div style="display:flex; gap:3px; color:#ffb400; font-size:15px;">
              <sc-for list="{{ r.stars }}" as="s" hint-placeholder-count="5">
                <i class="bi bi-star-fill"></i>
              </sc-for>
            </div>
            <i class="bi bi-quote" style="font-size:30px; color:color-mix(in srgb,var(--brand,#ffd400) 70%,#e9e7e1); line-height:.6;"></i>
          </div>
          <blockquote style="font:500 15px/1.55 inherit; color:#3a3833; margin:0 0 22px; flex:1; text-wrap:pretty;">{{ r.quote }}</blockquote>
          <figcaption style="display:flex; align-items:center; gap:13px; padding-top:18px; border-top:1px solid #f0efea;">
            <span style="flex:none; width:42px; height:42px; border-radius:50%; background:{{ r.avatarBg }}; color:#fff; display:flex; align-items:center; justify-content:center; font:800 16px/1 'Archivo',sans-serif;">{{ r.initial }}</span>
            <div>
              <div style="font:800 14.5px/1.1 'Archivo',sans-serif; color:#211f1b;">{{ r.name }}</div>
              <div style="font:600 12.5px/1.3 inherit; color:#9b9890; margin-top:3px;">{{ r.context }}</div>
            </div>
          </figcaption>
        </figure>
      </sc-for>
    </div>

    <!-- write-a-review CTA -->
    <div style="display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:34px;">
      <span style="font:600 14px/1.6 inherit; color:#6a6760;">Trained with us? We'd love to hear about it.</span>
      <a href="{{ reviewUrl }}" target="_blank" rel="noopener" class="rv-write" style="display:inline-flex; align-items:center; gap:9px; background:#211f1b; color:#fff; font:800 13px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; text-decoration:none; padding:13px 20px; border-radius:11px;"><i class="bi bi-google"></i> Leave a review</a>
    </div>

  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 620},
  &quot;brand&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#ffd400&quot;,&quot;#2196f3&quot;,&quot;#f44336&quot;,&quot;#2e9e4f&quot;,&quot;#8c52ff&quot;]},
  &quot;eyebrow&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;04 — What people say&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;heading&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Don't just take our word for it&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;subhead&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Thousands of flips, classes and parties later — here's what our community has to say.&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;ratingValue&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;4.9&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;ratingCount&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Based on 300+ reviews&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;reviewUrl&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.google.com/maps/place/The+Monkey+Vault&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;reviews&quot;: {&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{quote:string;name:string;context:string;stars:number}[]&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const brand = p.brand ?? '#ffd400';
    const ratingValue = (p.ratingValue ?? '4.9').toString();
    const full = Math.round(parseFloat(ratingValue) || 5);
    const palette = ['#2196f3', '#e27902', '#f44336', '#2e9e4f', '#8c52ff'];

    const raw = (p.reviews ?? [
      { quote: "My son has been going for over a year and the change is incredible — confidence, strength, and he counts down the days between visits. The coaches genuinely care.", name: 'Sarah M.', context: 'Parent · Youth Classes', stars: 5 },
      { quote: "Cleanest, friendliest gym in the city. Open gym is amazing value and there's space for total beginners and seasoned athletes alike. Foam pit never gets old.", name: 'Daniel K.', context: 'Member · Open Gym', stars: 5 },
      { quote: "Booked a birthday party here and it was the easiest, most fun event we've ever thrown. The kids were buzzing for days and the staff handled everything.", name: 'Priya R.', context: 'Parent · Birthday Party', stars: 5 },
    ]);

    const reviewList = (Array.isArray(raw) ? raw : []).map((r, i) => {
      const n = Math.max(0, Math.min(5, parseInt(r.stars, 10) || 5));
      const name = r.name || 'Guest';
      return {
        quote: r.quote || '',
        name,
        context: r.context || '',
        stars: Array.from({ length: n }),
        initial: name.trim().charAt(0).toUpperCase() || '★',
        avatarBg: palette[i % palette.length],
      };
    });

    return {
      brand,
      eyebrow: p.eyebrow ?? '04 — What people say',
      heading: p.heading ?? "Don't just take our word for it",
      subhead: p.subhead ?? 'Thousands of flips, classes and parties later — here\u2019s what our community has to say.',
      ratingValue,
      ratingStars: Array.from({ length: full }),
      ratingCount: p.ratingCount ?? 'Based on 300+ reviews',
      reviewUrl: p.reviewUrl ?? 'https://www.google.com/maps/place/The+Monkey+Vault',
      reviewList,
    };
  }
}
</script>
</body>
</html>
