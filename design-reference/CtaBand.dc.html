<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;}
  .ctab-card{transition:transform .18s ease, box-shadow .18s ease;}
  .ctab-card:hover{transform:translateY(-3px);}
  .ctab-card:hover .ctab-arrow{transform:translateX(4px);}
  .ctab-arrow{transition:transform .18s ease;}
</style>
</helmet>
<div style="--ink: {{ ink }}; --brand: {{ brand }}; display:grid; grid-template-columns:{{ cols }}; gap:18px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <sc-for list="{{ cardList }}" as="c" hint-placeholder-count="2">
    <a href="{{ c.href }}" class="ctab-card" style="text-decoration:none; display:flex; align-items:center; justify-content:space-between; gap:18px; background:{{ c.bg }}; color:{{ c.fg }}; border:{{ c.border }}; border-radius:16px; padding:28px 30px; box-shadow:0 1px 3px rgba(28,25,23,.05),0 16px 34px -28px rgba(28,25,23,.5);">
      <div style="display:flex; align-items:center; gap:18px;">
        <span style="flex:none; width:46px; height:46px; border-radius:12px; background:{{ c.iconBg }}; display:flex; align-items:center; justify-content:center;"><i class="bi {{ c.icon }}" style="font-size:20px; color:{{ c.iconFg }};"></i></span>
        <div>
          <div style="font:700 11px/1 'Archivo',sans-serif; letter-spacing:.13em; text-transform:uppercase; color:{{ c.eyebrowColor }}; margin-bottom:8px;">{{ c.eyebrow }}</div>
          <div style="font:800 23px/1.05 'Archivo',sans-serif; letter-spacing:-.012em;">{{ c.title }}</div>
        </div>
      </div>
      <i class="bi bi-arrow-right ctab-arrow" style="font-size:22px; color:{{ c.arrowColor }}; flex:none;"></i>
    </a>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 900, &quot;height&quot;: 130},
  &quot;cards&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;dark :: Passes &amp; Drop-ins :: See the Price List :: bi-tag-fill :: # || light :: All classes, one view :: Group Class Schedule :: bi-calendar3 :: #&quot;,&quot;tsType&quot;:&quot;string&quot;},
  &quot;brand&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#ffd400&quot;,&quot;#2196f3&quot;,&quot;#f44336&quot;]},
  &quot;ink&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#211f1b&quot;,&quot;tsType&quot;:&quot;string&quot;}
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const ink = p.ink ?? '#211f1b';
    const brand = p.brand ?? '#ffd400';
    const raw = (p.cards ?? 'dark :: Passes & Drop-ins :: See the Price List :: bi-tag-fill :: # || light :: All classes, one view :: Group Class Schedule :: bi-calendar3 :: #').toString();
    const cardList = raw.split('||').map(s => s.trim()).filter(Boolean).map(row => {
      const f = row.split('::').map(x => x.trim());
      const theme = (f[0] || 'dark').toLowerCase();
      const dark = theme === 'dark';
      return {
        eyebrow: f[1] || '', title: f[2] || '', icon: f[3] || 'bi-arrow-right', href: f[4] || '#',
        bg: dark ? ink : '#ffffff',
        fg: dark ? '#ffffff' : ink,
        border: dark ? 'none' : '1px solid #ebe9e4',
        iconBg: dark ? 'rgba(255,255,255,.1)' : 'color-mix(in srgb,' + brand + ' 22%, #fff)',
        iconFg: dark ? brand : ink,
        eyebrowColor: dark ? brand : '#b0aca3',
        arrowColor: dark ? brand : ink,
      };
    });
    return {
      ink, brand,
      cardList,
      cols: cardList.length >= 2 ? 'repeat(' + cardList.length + ',1fr)' : '1fr',
    };
  }
}
</script>
</body>
</html>
