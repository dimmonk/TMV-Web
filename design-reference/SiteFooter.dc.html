<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;}
  .sf-link:hover{color:var(--brand,#ffd400)!important;}
  .sf-soc:hover{background:var(--brand,#ffd400)!important; color:#211f1b!important;}
  @media(max-width:720px){ .sf-grid{grid-template-columns:1fr 1fr!important; gap:34px 24px!important;} }
  @media(max-width:440px){ .sf-grid{grid-template-columns:1fr!important;} }
</style>
</helmet>
<footer style="--brand: {{ brand }}; background:#1a1815; color:rgba(255,255,255,.6); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <div class="sf-grid" style="max-width:1200px; margin:0 auto; padding:54px 24px 32px; display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px;">
    <div>
      <div style="display:flex; align-items:center; gap:11px; margin-bottom:16px;">
        <img src="assets/tmvlogo.png" alt="" style="width:38px; height:38px; object-fit:contain;">
        <span style="font:900 16px/1 'Archivo',sans-serif; color:var(--brand,#ffd400); text-transform:uppercase;">The Monkey Vault</span>
      </div>
      <p style="font:400 13px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:rgba(255,255,255,.55); max-width:300px; margin:0;">Toronto's home for parkour, flips and movement. Train, play and level up — every age, every level.</p>
      <div style="display:flex; gap:10px; margin-top:18px;">
        <sc-for list="{{ socials }}" as="s" hint-placeholder-count="3">
          <a href="{{ s.href }}" aria-label="{{ s.label }}" class="sf-soc" style="width:36px; height:36px; border-radius:9px; background:rgba(255,255,255,.08); display:inline-flex; align-items:center; justify-content:center; color:#fff; text-decoration:none; transition:all .15s;"><i class="bi {{ s.icon }}"></i></a>
        </sc-for>
      </div>
    </div>
    <sc-for list="{{ columns }}" as="col" hint-placeholder-count="3">
      <div>
        <div style="font:700 11px/1 'Archivo',sans-serif; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:15px;">{{ col.title }}</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <sc-for list="{{ col.items }}" as="l" hint-placeholder-count="4">
            <sc-if value="{{ l.isText }}" hint-placeholder-val="">
              <span style="font:500 13px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:rgba(255,255,255,.6);">{{ l.text }}</span>
            </sc-if>
            <sc-if value="{{ l.isLink }}" hint-placeholder-val="{{ true }}">
              <a href="{{ l.href }}" target="{{ l.target }}" rel="noopener" class="sf-link" style="{{ l.style }}">{{ l.text }}</a>
            </sc-if>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
  <div style="max-width:1200px; margin:0 auto; padding:20px 24px; border-top:1px solid rgba(255,255,255,.08); display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; font:500 12.5px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:rgba(255,255,255,.35);">
    <span>© {{ year }} The Monkey Vault Inc. All rights reserved.</span>
    <span>Parkour &amp; Movement Training Centre · Toronto</span>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 360},
  &quot;brand&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#ffd400&quot;,&quot;#2196f3&quot;,&quot;#f44336&quot;]}
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const brand = p.brand ?? '#ffd400';
    const linkStyle = (accent) => `font:500 13px/1.3 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:${accent ? 'var(--brand,#ffd400)' : 'rgba(255,255,255,.6)'}; text-decoration:none; font-weight:${accent ? 700 : 500};`;
    const link = (text, href, opts = {}) => ({ isLink: true, text, href, target: opts.ext ? '_blank' : '_self', style: linkStyle(opts.accent) });
    const text = (t) => ({ isText: true, text: t });
    return {
      brand,
      year: new Date().getFullYear(),
      socials: [
        { icon:'bi-instagram', label:'Instagram', href:'#' },
        { icon:'bi-facebook', label:'Facebook', href:'#' },
      ],
      columns: [
        { title:'Explore', items:[
          link('Train','Train.dc.html'),
          link('Camps','Camps.dc.html'),
          link('Events','Events.dc.html'),
          link('Pricing','Pricing.dc.html'),
          link('About','About.dc.html'),
        ]},
        { title:'Visit', items:[
          text('75 Carl Hall Rd, Unit 15'),
          text('Toronto, Ontario'),
          text('Open daily · 11 AM – 10 PM'),
          link('New here? Get started','GetStarted.dc.html',{ accent:true }),
        ]},
        { title:'Book', items:[
          link('Book a session','BookNow.dc.html'),
          link('Passes & Pricing','Pricing.dc.html'),
          link('Online store','Store.dc.html'),
          link('Gift cards','https://squareup.com/gift/4PQGSAK7CK7FB/order',{ ext:true }),
        ]},
      ],
    };
  }
}
</script>
</body>
</html>
