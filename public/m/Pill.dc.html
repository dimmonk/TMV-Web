<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</helmet>
<div style="display:flex; flex-wrap:wrap; gap:{{ gapPx }};">
  <sc-for list="{{ pills }}" as="p" hint-placeholder-count="3">
    <span style="display:inline-flex; align-items:center; gap:6px; font:600 12.5px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; white-space:nowrap; border-radius:999px; padding:7px 12px; color:{{ p.fg }}; background:{{ p.bg }}; border:1px solid {{ p.bd }};"><sc-if value="{{ p.hasIcon }}" hint-placeholder-val=""><i class="bi {{ p.icon }}" style="font-size:11px; color:{{ p.iconColor }};"></i></sc-if>{{ p.text }}</span>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:80},&quot;items&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ages 5+ | Private room | Coach-led&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;,&quot;tinted&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2196f3&quot;,&quot;options&quot;:[&quot;#f44336&quot;,&quot;#ffd400&quot;,&quot;#e27902&quot;,&quot;#2196f3&quot;,&quot;#2e9e4f&quot;,&quot;#8c52ff&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;gap&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:8,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const variant = (p.variant ?? 'light').toString();
    const accent = (p.color && p.color.toString().trim()) ? p.color.toString().trim() : '#2196f3';

    // One canonical spec; only the colour treatment changes per variant.
    const themeFor = () => {
      if (variant === 'dark') return {
        fg: '#fff', bg: 'rgba(255,255,255,.09)', bd: '1px solid rgba(255,255,255,.16)'.replace('1px solid ',''),
        iconColor: '#fff',
      };
      if (variant === 'tinted') return {
        fg: accent,
        bg: 'color-mix(in srgb, ' + accent + ' 10%, #fff)',
        bd: 'color-mix(in srgb, ' + accent + ' 24%, #fff)',
        iconColor: accent,
      };
      // light (default)
      return { fg: '#3a3833', bg: '#f3f2ee', bd: '#e6e4dd', iconColor: '#9b9890' };
    };
    const t = themeFor();

    // items: "Label" or "Label#icon" (bootstrap-icon name w/o the bi- prefix optional), pipe-delimited
    const pills = (p.items ?? '').toString().split('|').map(s => s.trim()).filter(Boolean).map(s => {
      const [text, icon] = s.split('#').map(x => (x || '').trim());
      return {
        text, icon: icon ? icon.replace(/^bi\s+/, '').replace(/^bi-/, 'bi-') : '',
        hasIcon: !!icon,
        fg: t.fg, bg: t.bg, bd: t.bd, iconColor: t.iconColor,
      };
    });
    const gap = parseInt(p.gap, 10);
    return { pills, gapPx: (isNaN(gap) ? 8 : gap) + 'px' };
  }
}
</script>
</body>
</html>
