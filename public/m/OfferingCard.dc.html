<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="--c:{{ color }}; position:relative; height:{{ height }}; perspective:1600px; cursor:pointer; transition:transform .2s ease;" style-hover="transform:translateY(-5px);" onClick="{{ toggleFlip }}">
  <div style="position:relative; width:100%; height:100%; transition:transform .6s cubic-bezier(.2,.75,.25,1); transform-style:preserve-3d; transform:{{ innerTransform }};">

    <!-- FRONT -->
    <div style="position:relative; min-height:100%; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; background:#fff; border:1px solid #ebe9e4; border-radius:18px; overflow:hidden; box-shadow:0 1px 3px rgba(28,25,23,.05),0 16px 34px -30px rgba(28,25,23,.4);">
      <div style="position:relative; aspect-ratio:{{ mediaRatio }}; overflow:hidden; background:#eceae4;">
        <sc-if value="{{ isVideo }}" hint-placeholder-val="">
          <video ref="{{ videoRef }}" src="{{ image }}" style="width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease;"></video>
        </sc-if>
        <sc-if value="{{ isImage }}" hint-placeholder-val="">
          <img src="{{ image }}" alt="{{ title }}" style="width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease;">
        </sc-if>
        <sc-if value="{{ placeholderText }}" hint-placeholder-val="{{ true }}">
          <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; text-align:center; padding:18px; background:repeating-linear-gradient(45deg,#f0eee9,#f0eee9 12px,#ebe9e3 12px,#ebe9e3 24px);">
            <i class="bi bi-camera" style="font-size:22px; color:#a8a49a;"></i>
            <span style="font:700 10px/1 'Archivo',sans-serif; letter-spacing:.1em; text-transform:uppercase; color:#9b9890;">Photo needed</span>
            <span style="font:500 12.5px/1.5 inherit; color:#7a766e; max-width:230px;">{{ placeholderText }}</span>
          </div>
        </sc-if>
        <span style="position:absolute; top:12px; left:12px; z-index:2; font:700 10px/1 'Archivo',sans-serif; letter-spacing:.08em; text-transform:uppercase; color:#fff; background:{{ color }}; padding:6px 10px; border-radius:999px;">{{ tag }}</span>
        <span style="position:absolute; top:12px; right:12px; z-index:2; width:30px; height:30px; border-radius:50%; background:rgba(28,25,23,.5); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; transition:all .15s;" style-hover="background:{{ color }}; color:#fff;"><i class="bi bi-arrow-repeat"></i></span>
      </div>
      <div style="padding:{{ padFront }}; display:flex; flex-direction:column; flex:1;">
        <h3 style="font:800 {{ titleSize }}/1.1 'Archivo',sans-serif; letter-spacing:-.01em; margin:0 0 8px;">{{ title }}</h3>
        <p style="font:400 {{ descSize }}/1.5 inherit; color:#5b5853; margin:0 0 16px;">{{ desc }}</p>
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:auto; padding-top:14px; border-top:1px solid #f0efea;">
          <span style="display:inline-flex; align-items:center; gap:6px; font:700 12px/1 'Archivo',sans-serif; letter-spacing:.02em; color:#9b9890;"><i class="bi bi-arrow-repeat" style="color:{{ color }};"></i>Tap for full details</span>
          <a href="{{ href }}" onClick="{{ stop }}" style="display:inline-flex; align-items:center; gap:7px; font:800 13px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; color:#211f1b; text-decoration:none; transition:gap .15s;" style-hover="gap:11px;">Open <i class="bi bi-arrow-right" style="color:{{ color }};"></i></a>
        </div>
      </div>
    </div>

    <!-- BACK -->
    <div style="position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); background:#fff; border:1px solid #ebe9e4; border-radius:18px; padding:{{ padBack }}; display:flex; flex-direction:column;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <span style="font:700 11px/1 'Archivo',sans-serif; letter-spacing:.1em; text-transform:uppercase; color:{{ color }};">{{ title }}</span>
        <span style="display:inline-flex; align-items:center; gap:5px; font:700 11px/1 'Archivo',sans-serif; letter-spacing:.06em; text-transform:uppercase; color:#b0aca3; transition:color .15s;" style-hover="color:#211f1b;"><i class="bi bi-arrow-counterclockwise"></i> Back</span>
      </div>
      <h3 style="font:800 {{ backTitleSize }}/1.12 'Archivo',sans-serif; letter-spacing:-.01em; margin:0 0 16px;">{{ back }}</h3>
      <div style="display:flex; flex-direction:column; gap:13px; overflow-y:auto;">
        <sc-for list="{{ points }}" as="pt" hint-placeholder-count="3">
          <div style="display:flex; align-items:flex-start; gap:11px;">
            <span style="flex:none; width:30px; height:30px; border-radius:9px; background:color-mix(in srgb,{{ color }} 13%,#fff); display:flex; align-items:center; justify-content:center;"><i class="{{ pt.icon }}" style="font-size:14px; color:{{ color }};"></i></span>
            <span style="font:600 13px/1.3 inherit; color:#3a3833; padding-top:5px;">{{ pt.text }}</span>
          </div>
        </sc-for>
      </div>
      <a href="{{ href }}" onClick="{{ stop }}" style="margin-top:auto; display:inline-flex; align-items:center; gap:7px; font:800 13.5px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; color:#211f1b; text-decoration:none; transition:gap .15s; padding-top:16px;" style-hover="gap:11px;">Explore {{ title }} <i class="bi bi-arrow-right" style="color:{{ color }};"></i></a>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:432},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Train&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tag&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Classes · Open Gym&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;desc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Drop in for open gym, book a class, or train like an athlete — every age and level.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2196f3&quot;,&quot;options&quot;:[&quot;#2196f3&quot;,&quot;#e27902&quot;,&quot;#f44336&quot;,&quot;#8c52ff&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Train.dc.html&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;image&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Athletes training — open gym floor or a class mid-session&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;back&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;How you can train&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;points&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;{icon:string,text:string}[]&quot;},&quot;height&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;432px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;mediaRatio&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;16/10&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;titleSize&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;22px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;descSize&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;13px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;backTitleSize&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;20px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;padFront&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;22px 22px 24px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;padBack&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;24px 24px 22px&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { flipped: false };
  toggleFlip = (e) => {
    if (e.target.closest('a')) return;
    this.setState((s) => ({ flipped: !s.flipped }));
  };
  stop = (e) => e.stopPropagation();
  videoRef = (el) => {
    if (!el) return;
    el.muted = true; el.defaultMuted = true; el.loop = true; el.playsInline = true; el.autoplay = true;
    const play = () => el.play().catch(() => {});
    if (el.readyState >= 2) play(); else el.addEventListener('loadeddata', play, { once: true });
  };
  renderVals() {
    const p = this.props;
    const imageSrc = (p.image ?? '').toString();
    const isVideo = /\.(mp4|webm|ogv|mov)(\?|$)/i.test(imageSrc);
    return {
      toggleFlip: this.toggleFlip,
      stop: this.stop,
      innerTransform: this.state.flipped ? 'rotateY(180deg)' : 'none',
      title: p.title,
      tag: p.tag,
      desc: p.desc,
      color: p.color ?? '#211f1b',
      href: p.href ?? '#',
      image: imageSrc,
      isVideo, isImage: !!imageSrc && !isVideo, videoRef: this.videoRef,
      placeholderText: imageSrc ? '' : (p.placeholder ?? ''),
      back: p.back,
      points: p.points ?? [],
      height: p.height ?? '432px',
      mediaRatio: p.mediaRatio ?? '16/10',
      titleSize: p.titleSize ?? '22px',
      descSize: p.descSize ?? '13px',
      backTitleSize: p.backTitleSize ?? '20px',
      padFront: p.padFront ?? '22px 22px 24px',
      padBack: p.padBack ?? '24px 24px 22px',
    };
  }
}
</script>
</body>
</html>
