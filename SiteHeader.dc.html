<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;}
  .sh-nav a:hover{color:#fff!important;}
  .sh-cta{transition:transform .15s ease;}
  .sh-cta:hover{transform:translateY(-1px);}
  .sh-new{transition:all .15s ease;}
  .sh-new:hover{color:#fff!important; border-color:rgba(255,255,255,.4)!important;}
  .sh-burger{display:none; align-items:center; justify-content:center; width:42px; height:42px; flex-shrink:0; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:9px; color:#fff; font-size:20px; cursor:pointer; padding:0;}
  .sh-burger:hover{background:rgba(255,255,255,.14);}
  .sh-menu{display:none; flex-direction:column; padding:6px 16px 18px; background:#211f1b; border-top:1px solid rgba(255,255,255,.08);}
  .sh-mlink:hover{color:#fff!important;}
  @media(max-width:820px){
    .sh-nav{display:none!important;}
    .sh-new{display:none!important;}
    .sh-burger{display:inline-flex!important;}
    .sh-menu[data-open="true"]{display:flex;}
  }
  @media(max-width:460px){ .sh-word{display:none!important;} }
</style>
</helmet>
<header style="--brand: {{ brand }}; position:sticky; top:0; z-index:50; background:#211f1b; border-bottom:1px solid rgba(255,255,255,.08); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <div style="max-width:1200px; margin:0 auto; padding:0 20px; height:66px; display:flex; align-items:center; gap:20px;">
    <a href="Home.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none; flex-shrink:0;">
      <img src="assets/tmvlogo.png" alt="The Monkey Vault" style="width:40px; height:40px; object-fit:contain;">
      <span class="sh-word" style="font:900 18px/1 'Archivo',sans-serif; letter-spacing:.02em; color:var(--brand,#ffd400); text-transform:uppercase;">The Monkey&nbsp;Vault</span>
    </a>
    <nav class="sh-nav" style="display:flex; align-items:center; gap:22px; margin-left:auto;">
      <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="6">
        <a href="{{ n.href }}" style="{{ n.style }}">{{ n.label }}<sc-if value="{{ n.active }}" hint-placeholder-val=""><span style="position:absolute; left:0; right:0; bottom:-23px; height:3px; background:var(--brand,#ffd400);"></span></sc-if></a>
      </sc-for>
    </nav>
    <div style="display:flex; align-items:center; gap:10px; flex-shrink:0; margin-left:auto;">
      <a href="GetStarted.dc.html" class="sh-new" style="display:inline-flex; align-items:center; gap:6px; font:700 12.5px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; color:rgba(255,255,255,.72); text-decoration:none; padding:9px 13px; border-radius:8px; border:1px solid rgba(255,255,255,.2); white-space:nowrap;"><i class="bi bi-flag"></i> New here?</a>
      <a href="BookNow.dc.html" class="sh-cta" style="flex-shrink:0; display:inline-flex; align-items:center; gap:8px; background:var(--brand,#ffd400); color:#211f1b; font:800 13px/1 'Archivo',sans-serif; text-transform:uppercase; letter-spacing:.03em; text-decoration:none; padding:11px 15px; border-radius:9px; white-space:nowrap;">Book Now</a>
      <button class="sh-burger" aria-label="Menu" aria-expanded="{{ menuOpen }}" onClick="{{ toggle }}"><i class="bi {{ burgerIcon }}"></i></button>
    </div>
  </div>
  <nav class="sh-menu" data-open="{{ menuOpen }}">
    <sc-for list="{{ menuItems }}" as="m" hint-placeholder-count="6">
      <a href="{{ m.href }}" class="sh-mlink" style="{{ m.style }}">{{ m.label }}<sc-if value="{{ m.active }}" hint-placeholder-val=""><i class="bi bi-dot" style="color:var(--brand,#ffd400); font-size:24px; margin-left:-4px;"></i></sc-if></a>
    </sc-for>
    <a href="GetStarted.dc.html" class="sh-mlink" style="display:flex; align-items:center; gap:9px; font:700 15px/1 'Archivo',sans-serif; color:var(--brand,#ffd400); text-decoration:none; padding:15px 4px 6px;"><i class="bi bi-flag"></i> New here? Start here</a>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 66},
  &quot;active&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;&quot;,&quot;options&quot;:[&quot;&quot;,&quot;train&quot;,&quot;camps&quot;,&quot;events&quot;,&quot;pricing&quot;,&quot;store&quot;,&quot;about&quot;],&quot;tsType&quot;:&quot;string&quot;},
  &quot;brand&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd400&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#ffd400&quot;,&quot;#2196f3&quot;,&quot;#f44336&quot;,&quot;#2e9e4f&quot;]}
}">
class Component extends DCLogic {
  state = { open: false };
  renderVals() {
    const p = this.props;
    const brand = p.brand ?? '#ffd400';
    const active = (p.active ?? '').toString().toLowerCase();
    const open = !!this.state.open;
    const defs = [
      { key:'train',   label:'Train',   href:'Train.dc.html' },
      { key:'camps',   label:'Camps',   href:'Camps.dc.html' },
      { key:'events',  label:'Events',  href:'Events.dc.html' },
      { key:'pricing', label:'Pricing', href:'Pricing.dc.html' },
      { key:'store',   label:'Store',   href:'Store.dc.html' },
      { key:'about',   label:'About',   href:'About.dc.html' },
    ];
    const navItems = defs.map(d => {
      const on = d.key === active;
      const weight = on ? 700 : 600;
      const color = on ? '#fff' : 'rgba(255,255,255,.65)';
      return {
        label: d.label, href: d.href, active: on,
        style: `position:relative; font:${weight} 13.5px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:${color}; text-decoration:none; padding-bottom:3px; transition:color .15s;`,
      };
    });
    const menuItems = defs.map(d => {
      const on = d.key === active;
      const color = on ? '#fff' : 'rgba(255,255,255,.72)';
      return {
        label: d.label, href: d.href, active: on,
        style: `display:flex; align-items:center; font:${on ? 800 : 600} 16px/1 'Archivo',sans-serif; color:${color}; text-decoration:none; padding:14px 4px; border-bottom:1px solid rgba(255,255,255,.07); transition:color .15s;`,
      };
    });
    return {
      brand, navItems, menuItems,
      menuOpen: open ? 'true' : 'false',
      burgerIcon: open ? 'bi-x-lg' : 'bi-list',
      toggle: () => this.setState(s => ({ open: !s.open })),
    };
  }
}
</script>
</body>
</html>
